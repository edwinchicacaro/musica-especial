<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Música Especial — Demo Exclusiva</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--gold-light:#e8cc7a;--bg:#06060e;--surface:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.07);--text:#f0ece3;--muted:rgba(240,236,227,0.35)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:drift ease-in-out infinite alternate}
.orb1{width:600px;height:600px;background:radial-gradient(circle,#3b0f6e,transparent);top:-20%;left:-15%;opacity:0.5;animation-duration:16s}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#7c1d4a,transparent);bottom:-15%;right:-10%;opacity:0.4;animation-duration:12s;animation-delay:-5s}
.orb3{width:350px;height:350px;background:radial-gradient(circle,#c9a84c,transparent);top:35%;right:5%;opacity:0.15;animation-duration:18s;animation-delay:-9s}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,-25px) scale(1.12)}}
.page{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:3rem 1rem 4rem}
.header{text-align:center;margin-bottom:3rem;animation:fadeUp 0.8s ease both}
.logo-badge{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(201,168,76,0.25);border-radius:100px;padding:5px 18px;margin-bottom:1.5rem;background:rgba(201,168,76,0.06)}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 4px var(--gold)}50%{box-shadow:0 0 12px var(--gold),0 0 20px rgba(201,168,76,0.4)}}
.logo-text{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);font-weight:500}
.brand{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,6vw,3.4rem);font-weight:700;line-height:1.05}
.brand em{font-style:italic;color:var(--gold-light)}
.tagline{font-size:13px;color:var(--muted);margin-top:0.6rem;font-weight:300;letter-spacing:0.04em}
.player-card{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:2.2rem 2rem;backdrop-filter:blur(24px);box-shadow:0 50px 100px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.07);animation:fadeUp 0.9s ease 0.15s both}
.art-wrap{width:100%;aspect-ratio:1;border-radius:18px;background:linear-gradient(145deg,#120820,#1e0d3a,#0d0618);margin-bottom:1.6rem;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border:1px solid rgba(201,168,76,0.1)}
.art-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 25%,rgba(74,29,140,0.5) 0%,transparent 55%),radial-gradient(ellipse at 75% 75%,rgba(122,29,74,0.35) 0%,transparent 55%)}
.vinyl{width:155px;height:155px;border-radius:50%;background:conic-gradient(from 0deg,#0a0a0a,#181818,#0a0a0a,#181818,#0a0a0a);border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;box-shadow:0 0 40px rgba(0,0,0,0.8)}
.vinyl.spin{animation:vspin 2.8s linear infinite}
@keyframes vspin{to{transform:rotate(360deg)}}
.vinyl::before{content:'';position:absolute;inset:15px;border-radius:50%;background:conic-gradient(from 0deg,#111,#1a1a1a,#111,#1a1a1a,#111);border:1px solid #222}
.vinyl-center{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 40% 35%,var(--gold-light),var(--gold),#8b6914);border:1.5px solid rgba(255,255,255,0.15);position:relative;z-index:1;box-shadow:0 0 12px rgba(201,168,76,0.4)}
.lock-chip{position:absolute;top:12px;right:12px;z-index:2;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:5px 10px;font-size:10px;color:rgba(240,236,227,0.35);display:flex;align-items:center;gap:5px;pointer-events:none;letter-spacing:0.06em}
.song-meta{margin-bottom:1.2rem}
.song-title-disp{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:700;line-height:1.15;color:var(--text);margin-bottom:3px}
.song-artist-disp{font-size:12px;color:var(--muted);font-weight:300;letter-spacing:0.06em;text-transform:uppercase}
.playlist{display:flex;flex-direction:column;gap:4px;margin-bottom:1.4rem;max-height:180px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.2) transparent}
.playlist::-webkit-scrollbar{width:3px}
.playlist::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.2);border-radius:2px}
.pl-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all 0.2s}
.pl-item:hover{background:rgba(201,168,76,0.06);border-color:rgba(201,168,76,0.15)}
.pl-item.active{background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.3)}
.pl-num{font-size:10px;color:rgba(240,236,227,0.2);min-width:14px}
.pl-name{flex:1;font-size:13px;color:rgba(240,236,227,0.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-item.active .pl-name{color:var(--gold-light)}
.pl-dur{font-size:11px;color:rgba(240,236,227,0.25);font-variant-numeric:tabular-nums}
.waveform{height:46px;display:flex;align-items:center;gap:2px;margin-bottom:5px;cursor:pointer;user-select:none}
.bar{flex:1;border-radius:2px;background:rgba(255,255,255,0.1);min-height:2px;transition:background 0.1s}
.bar.played{background:var(--gold)}
.time-row{display:flex;justify-content:space-between;font-size:11px;color:rgba(240,236,227,0.28);margin-bottom:1.4rem;font-variant-numeric:tabular-nums}
.controls{display:flex;align-items:center;justify-content:center;gap:1.4rem;margin-bottom:1.2rem}
.btn-ctrl{background:none;border:none;cursor:pointer;color:rgba(240,236,227,0.3);padding:8px;border-radius:50%;transition:all 0.2s;font-size:17px;display:flex;align-items:center;justify-content:center}
.btn-ctrl:hover{color:rgba(240,236,227,0.8);transform:scale(1.12)}
.btn-play-main{width:62px;height:62px;border-radius:50%;background:linear-gradient(145deg,var(--gold-light),var(--gold),#8b6914);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(201,168,76,0.4);transition:all 0.15s;font-size:20px;color:#1a1000}
.btn-play-main:hover{transform:scale(1.07);box-shadow:0 12px 36px rgba(201,168,76,0.6)}
.btn-play-main:active{transform:scale(0.96)}
.vol-row{display:flex;align-items:center;gap:8px;margin-bottom:1.6rem}
.vol-icon{color:rgba(240,236,227,0.25);font-size:12px}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;cursor:pointer;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--gold);cursor:pointer}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:1.2rem}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,0.06)}
.divider-txt{font-size:10px;color:rgba(240,236,227,0.2);letter-spacing:0.1em;text-transform:uppercase}
.contact-row{display:flex;gap:8px}
.btn-contact{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 8px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;text-decoration:none}
.btn-wp{border:1px solid rgba(37,211,102,0.25);color:#4ade80;background:rgba(37,211,102,0.05)}
.btn-wp:hover{background:rgba(37,211,102,0.12);border-color:rgba(37,211,102,0.45);transform:translateY(-1px)}
.btn-em{border:1px solid rgba(201,168,76,0.25);color:var(--gold);background:rgba(201,168,76,0.05)}
.btn-em:hover{background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.45);transform:translateY(-1px)}
.contact-hint{text-align:center;font-size:11px;color:rgba(240,236,227,0.18);margin-top:8px}
.loading{text-align:center;padding:2rem;color:var(--muted);font-size:13px}
.footer{margin-top:2.5rem;text-align:center;color:rgba(240,236,227,0.12);font-size:11px;letter-spacing:0.06em}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
audio{display:none!important}
@media(max-width:480px){.page{padding:2rem 0.8rem 3rem}.player-card{padding:1.6rem 1.4rem;border-radius:22px}.brand{font-size:2rem}}
</style>
</head>
<body oncontextmenu="return false;">
<div class="bg-canvas"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div class="page">
  <header class="header">
    <div class="logo-badge"><span class="logo-dot"></span><span class="logo-text">Demo exclusiva</span></div>
    <h1 class="brand">Música <em>Especial</em></h1>
    <p class="tagline">Composiciones originales · Solo escucha</p>
  </header>
  <div class="player-card">
    <div class="art-wrap">
      <div class="vinyl" id="vinyl"><div class="vinyl-center"></div></div>
      <div class="lock-chip">🔒 Sin descarga</div>
    </div>
    <div class="song-meta">
      <div class="song-title-disp" id="dispTitle">Cargando...</div>
      <div class="song-artist-disp" id="dispArtist">Música Especial</div>
    </div>
    <div class="playlist" id="playlist"><div class="loading">Cargando canciones...</div></div>
    <div class="waveform" id="waveform"></div>
    <div class="time-row"><span id="curTime">0:00</span><span id="totTime">0:00</span></div>
    <div class="controls">
      <button class="btn-ctrl" id="btnPrev">⏮</button>
      <button class="btn-play-main" id="btnPlay">▶</button>
      <button class="btn-ctrl" id="btnNext">⏭</button>
    </div>
    <div class="vol-row">
      <span class="vol-icon">🔈</span>
      <input type="range" id="volSlider" min="0" max="100" value="85">
      <span class="vol-icon">🔊</span>
    </div>
    <div class="divider"><div class="divider-line"></div><span class="divider-txt">¿Te gustó? Contáctanos</span><div class="divider-line"></div></div>
    <div class="contact-row">
      <a class="btn-contact btn-wp" href="https://wa.me/50767962607" target="_blank" rel="noopener">💬 WhatsApp</a>
      <a class="btn-contact btn-em" href="mailto:director@vivoentretenimiento.co" target="_blank" rel="noopener">✉ Email</a>
    </div>
    <p class="contact-hint">Escríbenos para obtener la pista completa</p>
  </div>
  <footer class="footer">© Música Especial · Todos los derechos reservados</footer>
</div>
<audio id="audioEl" preload="auto"></audio>
<script>
(function(){
  const CANCIONES_URL = 'canciones.json';
  let songs = [], currentIdx = -1, isDragging = false;
  const BAR_COUNT = 58;
  const audioEl    = document.getElementById('audioEl');
  const vinyl      = document.getElementById('vinyl');
  const btnPlay    = document.getElementById('btnPlay');
  const btnPrev    = document.getElementById('btnPrev');
  const btnNext    = document.getElementById('btnNext');
  const volSlider  = document.getElementById('volSlider');
  const waveformEl = document.getElementById('waveform');
  const curTimeEl  = document.getElementById('curTime');
  const totTimeEl  = document.getElementById('totTime');
  const dispTitle  = document.getElementById('dispTitle');
  const dispArtist = document.getElementById('dispArtist');
  const playlistEl = document.getElementById('playlist');

  function buildWaveform(){
    waveformEl.innerHTML='';
    Array.from({length:BAR_COUNT},(_,i)=>{
      const b=document.createElement('div');
      b.className='bar';
      b.style.height=(10+Math.abs(Math.sin(i/BAR_COUNT*Math.PI*3+Math.random()*2))*70+Math.random()*20)+'%';
      waveformEl.appendChild(b);
    });
  }
  buildWaveform();

  function updateBars(){
    const bars=waveformEl.querySelectorAll('.bar');
    const pct=audioEl.duration?audioEl.currentTime/audioEl.duration:0;
    const played=Math.floor(pct*BAR_COUNT);
    bars.forEach((b,i)=>b.classList.toggle('played',i<played));
  }

  function fmt(s){
    if(!s||isNaN(s))return'0:00';
    const m=Math.floor(s/60),sec=Math.floor(s%60);
    return m+':'+(sec<10?'0':'')+sec;
  }

  function loadSong(idx){
    if(idx<0||idx>=songs.length)return;
    currentIdx=idx;
    const s=songs[idx];
    audioEl.pause();
    audioEl.src=s.url;
    audioEl.volume=volSlider.value/100;
    dispTitle.textContent=s.titulo;
    dispArtist.textContent=s.artista||'Música Especial';
    buildWaveform();
    curTimeEl.textContent='0:00';
    totTimeEl.textContent='--:--';
    btnPlay.textContent='▶';
    vinyl.classList.remove('spin');
    renderPlaylist();
  }

  function togglePlay(){
    if(songs.length===0)return;
    if(currentIdx<0)loadSong(0);
    if(audioEl.paused){
      audioEl.play().catch(()=>{});
      btnPlay.textContent='⏸';
      vinyl.classList.add('spin');
    }else{
      audioEl.pause();
      btnPlay.textContent='▶';
      vinyl.classList.remove('spin');
    }
  }

  audioEl.addEventListener('timeupdate',()=>{
    if(!isDragging){curTimeEl.textContent=fmt(audioEl.currentTime);updateBars();}
  });
  audioEl.addEventListener('loadedmetadata',()=>{
    totTimeEl.textContent=fmt(audioEl.duration);
    if(currentIdx>=0){songs[currentIdx]._dur=fmt(audioEl.duration);renderPlaylist();}
  });
  audioEl.addEventListener('ended',()=>{
    if(currentIdx<songs.length-1){
      loadSong(currentIdx+1);
      audioEl.play().catch(()=>{});
      btnPlay.textContent='⏸';
      vinyl.classList.add('spin');
    }else{btnPlay.textContent='▶';vinyl.classList.remove('spin');}
  });

  waveformEl.addEventListener('mousedown',e=>{isDragging=true;seek(e);});
  document.addEventListener('mousemove',e=>{if(isDragging)seek(e);});
  document.addEventListener('mouseup',()=>{isDragging=false;});
  function seek(e){
    if(!audioEl.duration)return;
    const rect=waveformEl.getBoundingClientRect();
    const pct=Math.min(Math.max((e.clientX-rect.left)/rect.width,0),1);
    audioEl.currentTime=pct*audioEl.duration;
    updateBars();curTimeEl.textContent=fmt(audioEl.currentTime);
  }
  waveformEl.addEventListener('touchstart',e=>seekT(e),{passive:true});
  waveformEl.addEventListener('touchmove',e=>seekT(e),{passive:true});
  function seekT(e){
    if(!audioEl.duration)return;
    const t=e.touches[0],rect=waveformEl.getBoundingClientRect();
    const pct=Math.min(Math.max((t.clientX-rect.left)/rect.width,0),1);
    audioEl.currentTime=pct*audioEl.duration;updateBars();
  }

  btnPlay.addEventListener('click',togglePlay);
  btnPrev.addEventListener('click',()=>{
    if(currentIdx>0){const p=!audioEl.paused;loadSong(currentIdx-1);if(p){audioEl.play().catch(()=>{});btnPlay.textContent='⏸';vinyl.classList.add('spin');}}
  });
  btnNext.addEventListener('click',()=>{
    if(currentIdx<songs.length-1){const p=!audioEl.paused;loadSong(currentIdx+1);if(p){audioEl.play().catch(()=>{});btnPlay.textContent='⏸';vinyl.classList.add('spin');}}
  });
  volSlider.addEventListener('input',()=>{audioEl.volume=volSlider.value/100;});

  function renderPlaylist(){
    playlistEl.innerHTML='';
    songs.forEach((s,i)=>{
      const item=document.createElement('div');
      item.className='pl-item'+(i===currentIdx?' active':'');
      item.innerHTML=`<span class="pl-num">${i+1}</span><span class="pl-name">${s.titulo}</span><span class="pl-dur">${s._dur||'--:--'}</span>`;
      item.addEventListener('click',()=>{
        const p=!audioEl.paused;loadSong(i);
        if(p){audioEl.play().catch(()=>{});btnPlay.textContent='⏸';vinyl.classList.add('spin');}
      });
      playlistEl.appendChild(item);
    });
  }

  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&['s','u','a','p'].includes(e.key.toLowerCase()))e.preventDefault();
  });
  document.addEventListener('dragstart',e=>e.preventDefault());

  fetch(CANCIONES_URL)
    .then(r=>r.json())
    .then(data=>{
      songs=data.canciones||[];
      if(songs.length>0){loadSong(0);}
      else{playlistEl.innerHTML='<div class="loading">No hay canciones disponibles.</div>';}
    })
    .catch(()=>{
      playlistEl.innerHTML='<div class="loading">Error cargando canciones.</div>';
    });
})();
</script>
</body>
</html>
